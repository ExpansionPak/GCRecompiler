name: Multi-Platform Build

on: [push, pull_request]

permissions:
  contents: write  # This allows the action to create releases and upload assets

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This defines the three different operating systems to run on
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up C++ Environment
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Set up CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake -y

      - name: Set up CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Configure CMake (macOS ARM64)
        if: runner.os == 'macOS'
        run: cmake -B build-arm64 -S . -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build (macOS ARM64)
        if: runner.os == 'macOS'
        run: cmake --build build-arm64 --config Release

      - name: Configure CMake (macOS x86_64)
        if: runner.os == 'macOS'
        run: cmake -B build-x86_64 -S . -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build (macOS x86_64)
        if: runner.os == 'macOS'
        run: cmake --build build-x86_64 --config Release

      - name: Create Universal Binary (macOS)
        if: runner.os == 'macOS'
        run: |
          lipo -create build-arm64/gcrecomp build-x86_64/gcrecomp -output gcrecomp-universal

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -S .

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -S .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          mkdir -p package
          copy build\Release\gcrecomp.exe package\
          powershell Compress-Archive -Path package\* -DestinationPath gcrecomp_windows.zip
          
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp build/gcrecomp package/
          zip -r gcrecomp_linux.zip package/
          
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          cp gcrecomp-universal package/gcrecomp
          zip -r gcrecomp_macos.zip package/

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: gcrecomp_*.zip

  release:
    needs: build # This ensures it only runs if all 3 OS builds pass
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # Only runs when you push a tag
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true  # <--- THIS MARKS IT AS PRE-RELEASE
          files: binaries-*/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}